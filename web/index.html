<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My first HTML web page">
    <title>My First Web Page test, 2</title>
    <style>
        /* Basic CSS styling    ffff*/
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
        }
        main {
            padding: 2rem;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 0.5rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Page Header -->
    <header>
        <h1>Welcome to My First Web Page</h1>
    </header>

    <!-- Main Content -->
    <main>
        <p>Hello, world! This is my very first HTML page.</p>
        <p>I can add <strong>bold text</strong>, <em>italic text</em>, and even links like 
           <a href="https://www.example.com" target="_blank">this one</a>.
        </p>
        <img src="https://via.placeholder.com/300" alt="Sample Image">
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2026 My First Web Page
    </footer>

</body>
</html>
